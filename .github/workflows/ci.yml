name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate
        run: scripts/validate.sh

      - name: Upload package smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7dayssharp-package-smoke-${{ github.sha }}
          path: artifacts/package-smoke/*.nupkg
          if-no-files-found: error
