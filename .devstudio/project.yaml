name: api-7dayssharp
repo_root: /mnt/data/lancer1977/code/Api.7DaysSharp

languages:
  - csharp
frameworks:
  - dotnet

ci:
  build:
    - dotnet build RconSharp.slnx --configuration Release --no-restore
  test:
    - dotnet test RconSharp.slnx --configuration Release --no-restore --no-build --verbosity normal

devstudio:
  runtime_model: three-agent
  backlog_ordering: filename
  skip_promoted_planning: true
  one_stage_per_run: true
